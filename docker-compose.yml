services:
  postgres:
    image: postgres:16
    container_name: agro-postgres
    environment:
      POSTGRES_DB: agro_consorcio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: agro-backend
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/agro_consorcio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    container_name: agro-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
